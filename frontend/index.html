<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BladeRunner – Borbély Foglalás</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --border: rgba(255, 255, 255, 0.06);
      --text: #F2F2F2;
      --muted: #B8B8B8;
      --accent: #C9A84C;
      --radius: 12px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg) !important;
      color: var(--text) !important;
      font-family: 'DM Sans', sans-serif !important;
      min-height: 100vh;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Playfair Display', serif;
    }

    /* ── Bootstrap card overrides ── */
    .card {
      background-color: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      color: var(--text) !important;
    }

    .card-footer {
      background-color: transparent !important;
      border-top: 1px solid var(--border) !important;
    }

    .text-muted {
      color: var(--muted) !important;
    }

    /* ── Buttons ── */
    .btn-dark {
      background-color: var(--accent) !important;
      border-color: var(--accent) !important;
      color: #0A0A0A !important;
      font-weight: 600;
      letter-spacing: .03em;
    }

    .btn-dark:hover,
    .btn-dark:focus {
      background-color: #b8923e !important;
      border-color: #b8923e !important;
    }

    .btn-outline-dark {
      border-color: var(--accent) !important;
      color: var(--accent) !important;
      background: transparent !important;
    }

    .btn-outline-dark:hover,
    .btn-outline-dark:focus {
      background-color: var(--accent) !important;
      color: #0A0A0A !important;
    }

    /* ── Form controls – underline style ── */
    .form-label {
      color: var(--muted);
      font-size: .8rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .form-control,
    .form-select {
      background: transparent !important;
      border: none !important;
      border-bottom: 1px solid var(--border) !important;
      border-radius: 0 !important;
      color: var(--text) !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
    }

    .form-control:focus,
    .form-select:focus {
      background: transparent !important;
      border-bottom-color: var(--accent) !important;
      box-shadow: none !important;
      color: var(--text) !important;
    }

    .form-control::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    .form-select option {
      background: var(--surface);
      color: var(--text);
    }

    /* ── Login inputs ── */
    .login-input {
      background: var(--bg) !important;
      border: 1px solid var(--accent) !important;
      border-radius: 8px !important;
      padding-left: .75rem !important;
      padding-right: .75rem !important;
      color: var(--text) !important;
    }

    .login-input:focus {
      background: var(--bg) !important;
      border-color: var(--accent) !important;
      color: var(--accent) !important;
    }

    .login-input:-webkit-autofill,
    .login-input:-webkit-autofill:hover,
    .login-input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #0A0A0A inset !important;
      -webkit-text-fill-color: #C9A84C !important;
      caret-color: #C9A84C;
    }

    /* ── Alerts ── */
    .alert-danger {
      background-color: rgba(220, 53, 69, 0.1) !important;
      border-color: rgba(220, 53, 69, 0.3) !important;
      color: #f87171 !important;
    }

    /* ── Badges ── */
    .badge.bg-warning {
      background-color: var(--accent) !important;
      color: #0A0A0A !important;
    }

    /* ── List groups ── */
    .list-group-item {
      background-color: var(--surface) !important;
      border-color: var(--border) !important;
      color: var(--text) !important;
    }

    /* ── Tables ── */
    .table {
      color: var(--text);
    }

    .table-dark {
      background-color: var(--surface) !important;
    }

    .table-hover tbody tr:hover {
      background-color: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    /* ── Animations ── */
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
