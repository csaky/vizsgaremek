<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0a"/>
  
  <!-- Razor blade / scissors icon in gold -->
  <!-- Scissor top blade -->
  <line x1="8" y1="10" x2="22" y2="22" stroke="#c9a84c" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Scissor bottom blade -->
  <line x1="8" y1="22" x2="22" y2="10" stroke="#c9a84c" stroke-width="2.2" stroke-linecap="round"/>
  
  <!-- Pivot circle -->
  <circle cx="15" cy="16" r="2" fill="#0a0a0a" stroke="#c9a84c" stroke-width="1.5"/>
  
  <!-- Handle circles -->
  <circle cx="8" cy="10" r="2.8" fill="none" stroke="#c9a84c" stroke-width="1.8"/>
  <circle cx="8" cy="22" r="2.8" fill="none" stroke="#c9a84c" stroke-width="1.8"/>
</svg>
